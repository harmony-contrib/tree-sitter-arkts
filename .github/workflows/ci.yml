name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{github.workflow}}-${{github.ref}}
  cancel-in-progress: true

jobs:
  test:
    name: Test parsers
    runs-on: ${{matrix.os}}
    env:
      npm_config_msvs_version: 2022
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-2022, macos-14]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up tree-sitter
        uses: tree-sitter/setup-action/cli@v2
        with:
          tree-sitter-ref: v0.24.4
      - name: Run tests
        uses: tree-sitter/parser-test-action@v2
        with:
          abi-version: 14
          test-rust: true
          test-node: true
          node-version: "22.21.1"
          test-python: true
          python-version: "3.12"
          test-go: true
          go-version: "1.22"
          test-swift: true
          swift-version: "6.1"
      - name: Extract corpus fixtures
        run: node scripts/extract-corpus-fixtures.mjs
      - name: Parse ArkTS/JS/TS corpus fixtures
        id: test
        uses: tree-sitter/parse-action@v4
        with:
          files: |
            build/corpus-fixtures/arkts/**/*.ets
            build/corpus-fixtures/javascript/**/*.js
            build/corpus-fixtures/typescript/**/*.ts
