name: Publish packages

on:
  push:
    tags: ["*"]
  workflow_dispatch:
    inputs:
      version:
        description: Release version to publish, for example 0.0.1-beta.0
        required: true
        default: 0.0.1-beta.0

permissions:
  contents: read
  id-token: write

env:
  NODE_VERSION: "22.21.1"
  TREE_SITTER_ABI_VERSION: "14"

jobs:
  build-wasm:
    name: Build Wasm binary
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          cache: npm
          node-version: ${{env.NODE_VERSION}}
      - name: Sync release version
        run: npm run release:version -- "$RELEASE_VERSION"
        shell: bash
        env:
          RELEASE_VERSION: ${{github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name}}
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      - name: Regenerate parser
        run: npx tree-sitter generate --abi $TREE_SITTER_ABI_VERSION
      - name: Build Wasm binary
        continue-on-error: true
        run: npx tree-sitter build --wasm .
      - name: Upload Wasm binary
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: ignore
          name: wasm
          path: "*.wasm"
          retention-days: 2

  build-node:
    name: Build Node.js binary (${{matrix.os}})
    runs-on: ${{matrix.os}}
    env:
      npm_config_msvs_version: 2022
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-2022, macos-14]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          cache: npm
          node-version: ${{env.NODE_VERSION}}
      - name: Sync release version
        run: npm run release:version -- "$RELEASE_VERSION"
        shell: bash
        env:
          RELEASE_VERSION: ${{github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name}}
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      - name: Regenerate parser
        run: npx tree-sitter generate --abi $TREE_SITTER_ABI_VERSION
        shell: bash
      - name: Build Node.js binary
        run: npx prebuildify -t 20.19.5
      - name: Upload Node.js binary
        uses: actions/upload-artifact@v4
        with:
          name: prebuilds-${{matrix.os}}
          path: prebuilds/**
          retention-days: 2

  publish:
    name: Publish npm package
    needs: [build-wasm, build-node]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          cache: npm
          node-version: ${{env.NODE_VERSION}}
          registry-url: https://registry.npmjs.org/
      - name: Sync release version
        run: npm run release:version -- "$RELEASE_VERSION"
        shell: bash
        env:
          RELEASE_VERSION: ${{github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name}}
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      - name: Regenerate parser
        run: npx tree-sitter generate --abi $TREE_SITTER_ABI_VERSION
      - name: Download Node.js binaries
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: prebuilds
          pattern: prebuilds-*
      - name: Download Wasm binary
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: wasm
          path: .
      - name: Show package contents
        run: npm pack --dry-run
      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{secrets.NPM_TOKEN}}

  publish-crate:
    name: Publish Rust crate
    needs: [build-wasm, build-node]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          cache: npm
          node-version: ${{env.NODE_VERSION}}
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Sync release version
        run: npm run release:version -- "$RELEASE_VERSION"
        shell: bash
        env:
          RELEASE_VERSION: ${{github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name}}
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      - name: Regenerate parser
        run: npx tree-sitter generate --abi $TREE_SITTER_ABI_VERSION
      - name: Show crate contents
        run: cargo package --allow-dirty --list
      - name: Publish to crates.io
        run: |
          if [ -z "$CARGO_REGISTRY_TOKEN" ]; then
            echo "Set either CARGO_REGISTRY_TOKEN or CRATES_IO_TOKEN in repository secrets."
            exit 1
          fi
          cargo publish --allow-dirty --token "$CARGO_REGISTRY_TOKEN"
        env:
          CARGO_REGISTRY_TOKEN: ${{secrets.CARGO_REGISTRY_TOKEN || secrets.CRATES_IO_TOKEN}}
