name: Fuzz Parser

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  fuzz:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        corpus:
          - arkts
          - javascript
          - typescript
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Extract corpus fixtures
        run: node scripts/extract-corpus-fixtures.mjs
      - name: Configure tree-sitter pkg-config path
        run: |-
          prefix="$RUNNER_TOOL_CACHE/tree-sitter/lib"
          printf 'PKG_CONFIG_PATH=%s/share/pkgconfig:%s/lib/pkgconfig%s\n' \
            "$prefix" \
            "$prefix" \
            "${PKG_CONFIG_PATH:+:$PKG_CONFIG_PATH}" >> "$GITHUB_ENV"
      - name: Fuzz parser with ${{matrix.corpus}} seeds
        uses: tree-sitter/fuzz-action@v4
        with:
          directory: .
          corpus: build/corpus-fixtures/${{matrix.corpus}}
          tree-sitter-version: v0.24.4
