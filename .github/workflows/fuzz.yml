name: Fuzz Parser

on:
  push:
    branches: [master]
    paths:
      - grammar.js
      - src/grammar.json
      - src/parser.c
      - src/scanner.c
      - common/scanner.h
      - scripts/**
      - test/corpus/**
  pull_request:
    paths:
      - grammar.js
      - src/grammar.json
      - src/parser.c
      - src/scanner.c
      - common/scanner.h
      - scripts/**
      - test/corpus/**
  workflow_dispatch:

jobs:
  fuzz:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        corpus:
          - arkts
          - javascript
          - typescript
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Extract corpus fixtures
        run: node scripts/extract-corpus-fixtures.mjs
      - name: Fuzz parser with ${{matrix.corpus}} seeds
        uses: tree-sitter/fuzz-action@v4
        with:
          directory: .
          corpus: build/corpus-fixtures/${{matrix.corpus}}
          tree-sitter-version: v0.24.4
